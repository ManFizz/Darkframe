<html>
<head lang="en" data-bs-theme="dark">
    <meta charset="UTF-8">
    <meta name="viewport"
          content="width=device-width, user-scalable=no, initial-scale=1.0, maximum-scale=1.0, minimum-scale=1.0">
    <meta http-equiv="X-UA-Compatible" content="ie=edge">

    <title>Gallery</title>
    <link href="../node_modules/bootstrap/dist/css/bootstrap.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.10.3/font/bootstrap-icons.css">
    <link href="../src/css/main.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/animate.css/4.1.1/animate.min.css" />

    <script src="https://cdnjs.cloudflare.com/ajax/libs/popper.js/2.10.2/umd/popper.min.js"></script>
    <script src="https://ajax.googleapis.com/ajax/libs/jquery/1.9.1/jquery.min.js" type="text/javascript"></script>
    <script src="../src/lib/js/bootstrap.bundle.js" type="text/javascript"></script>
    <script src="../src/lib/js/jquery.twbsPagination.js" type="text/javascript"></script>
    <script src="../src/js/thumb.mjs" type="module"></script>
</head>

<body class="bg-dark" data-bs-theme="dark">
<nav class="navbar navbar-expand-lg sticky-top navbar-dark text-white bg-dark">
    <div class="container-lg">
        <div class="btn-group">
            <button class="btn btn-primary" id="nav-toggle-view"><i class="bi bi-grid-1x2-fill"></i></button>
            <button class="btn btn-primary" id="nav-fav">Favorites</button>
            <button class="btn btn-primary" id="nav-fold">Folders</button>
            <button type="button" class="dropdown-toggle dropdown btn  btn-primary" data-bs-toggle="dropdown">
                Sites
                <ul class="dropdown-menu">
                    <li class="dropdown-item">
                        <a class="dropdown-item" id="nav-r34">R34</a>
                    </li>
                    <li class="dropdown-item">
                        <a class="dropdown-item" id="nav-p365">P365</a>
                    </li>
                </ul>
            </button>
        </div>
    </div>
</nav>

<dialog class="modal">
    <i class="bi bi-chevron-compact-left arrow arrow-left" id="post-prev" ></i>
    <i class="bi bi-chevron-compact-right arrow arrow-right" id="post-next"></i>
    <i class="bi bi-x-lg btn-cancel" id="close-modal"></i>
    <div class="video-controls">
        <div class="video-misc">
            <i class="bi bi-repeat-1 btn-repeat-1" id="toggle-repeat-1"></i>
            <i class="bi bi-repeat  btn-repeat hidden" id="toggle-repeat"></i>
            <i class="bi bi-volume-mute-fill btn-mute hidden" id="btn-mute"></i>
            <i class="bi bi-volume-up-fill btn-volume" id="btn-volume"></i>
        </div>
        <div class="time-control">
            <time id="time-elapsed">00:00</time>
            <i class="bi bi-skip-start-fill"></i>
            <i class="bi bi-rewind-fill"></i>
            <i class="bi bi-pause-fill btn-pause"></i>
            <i class="bi bi-play-fill btn-play hidden"></i>
            <i class="bi bi-fast-forward-fill"></i>
            <i class="bi bi-skip-end-fill"></i>
            <time id="duration">00:00</time>
        </div>
        <div class="video-progress">
            <progress id="progress-bar" value="0"></progress>
            <input class="seek" id="seek" value="0" min="0" type="range" step="1">
            <div class="seek-tooltip" id="seek-tooltip">
                <div id="arrow" data-popper-arrow="true">.</div>
            </div>
        </div>
    </div>

    <img>
    <video autoplay loop><source src=""></video>
    <div class="col-md-6 d-flex flex-wrap justify-content-center mx-auto pt-2" id="modal-tags">
        <span class="badge bg-primary">Ass focus</span>
    </div>
</dialog>
<div class="wrapper d-flex align-items-stretch main-split">
    <nav class="sidebar bg-dark text-white open">
        <div class="custom-menu">
            <button type="button" id="sidebarCollapse" class="btn btn-primary">
                <i class="bi bi-list"></i>
            </button>
        </div>
        <section id="section-r34">
            <p class="h1">Rule 34</p>
            <p class="h6">Search by tags</p>
            <form id="tags-form">
                <div class="input-group">
                    <input class="form-control" type="text" autofocus="" placeholder="Tags..." id="tags-input">
                    <ul class="dropdown-menu mt-5" id="ul-tags"></ul>
                    <button class="btn btn-secondary" type="submit"><i class="bi bi-search"></i></button>
                </div>
                <input class="form-control" type="number" id="rate-input" name="rate-input" min="0" max="2000" value="0">
            </form>
            <form  class="tag-list" id="tags-select">
            </form>
            <hr />
            <form class="tag-list" id="tags-fav-select">
                <div class="btn-group">
                    <button type="button" class="btn btn-primary">kosaki_wit</button>
                    <button type="button" class="btn btn-success"><i class="bi bi-plus-lg"></i></button>
                    <button type="button" class="btn btn-warning"><i class="bi bi-dash-lg"></i></button>
                    <button type="button" class="btn btn-danger"><i class="bi bi-x-lg"></i></button>
                </div>
            </form>
            <form id="tag-fav-add">
                <div class="input-group">
                    <input class="form-control" type="text" autofocus="" placeholder="Place tag...">
                    <button class="btn btn-secondary" type="submit"><i class="bi bi-plus-lg"></i></button>
                </div>
            </form>
            <button class="btn btn-secondary" type="submit">Find</button>
        </section>
        <section id="section-folders" hidden>
            <form class="input-group mb-0" id="path-form">
                <input class="form-control" type="text" autofocus placeholder="Path to folder"/>
                <button class="btn btn-secondary" type="submit">Submit</button>
                <button class="btn btn-warning" type="reset">Reset</button>
            </form>
        </section>
    </nav>

    <div class="container-fluid" id="main-container">
        <div class="gallery-view-1" id="gallery"></div>
        <ul id="pagination" class="pagination-sm fixed-bottom justify-content-center"></ul>
    </div>
</div>
<script src="../dist/main.bundle.js" type="module"></script>
<script src="../dist/r34.bundle.js" type="module"></script>
<script src="../dist/modal.bundle.js" type="module"></script>
<script src="../dist/backend.bundle.js" type="module"></script>
</body>

</html>
